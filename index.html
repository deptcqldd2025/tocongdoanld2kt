<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Công đoàn LĐ2-KT | Đăng nhập</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    
    <style>
        :root { --primary: #004a99; --accent: #d32f2f; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        .logo { text-align: center; margin-bottom: 20px; color: var(--primary); font-weight: bold; font-size: 22px; line-height: 1.2; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; color: #444; }
        .input-group { position: relative; margin-top: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: var(--primary); }
        .toggle-password { position: absolute; right: 12px; top: 11px; cursor: pointer; font-size: 18px; }
        
        .btn { width: 100%; padding: 13px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #003366; }
        .btn-outline { background: none; border: 1px solid var(--primary); color: var(--primary); margin-top: 10px; }
        
        .auth-toggle { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .auth-toggle span { color: var(--primary); cursor: pointer; font-weight: bold; text-decoration: underline; }
        .hidden { display: none; }
        #statusMsg { font-size: 13px; text-align: center; margin-top: 10px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">TỔ CÔNG ĐOÀN LĐ2-KT<br><span style="font-size: 14px; font-weight: normal; color: #666;">Dự án QLDD-2025</span></div>
    <div id="statusMsg"></div>

    <div id="loginForm">
        <label>Email đoàn viên:</label>
        <input type="email" id="loginEmail" placeholder="Nhập email đã đăng ký">
        
        <label>Mật khẩu:</label>
        <div class="input-group">
            <input type="password" id="loginPass" placeholder="Nhập mật khẩu">
            <span class="toggle-password" onclick="togglePass('loginPass')">👁️</span>
        </div>
        
        <button class="btn btn-primary" onclick="handleLogin()">ĐĂNG NHẬP</button>
        <p style="text-align:right; font-size:12px; margin-top:10px;"><span style="color:var(--accent); cursor:pointer; font-weight:bold;" onclick="forgotPass()">Quên mật khẩu?</span></p>
        
        <div class="auth-toggle">Chưa có tài khoản? <span onclick="showRegister()">Đăng ký thành viên</span></div>
    </div>

    <div id="registerForm" class="hidden">
        <label>Mã số nhân viên (MSNV):</label>
        <input type="text" id="regMsnv" placeholder="Ví dụ: 001702" oninput="lookupName()">
        <div id="regName" style="font-size:12px; color:blue; margin-top:5px; font-weight: bold;"></div>

        <label>Email cá nhân (Để nhận OTP):</label>
        <input type="email" id="regEmail" placeholder="Nhập email chính xác">

        <label>Tạo mật khẩu mới:</label>
        <div class="input-group">
            <input type="password" id="regPass" placeholder="Tối thiểu 6 ký tự">
            <span class="toggle-password" onclick="togglePass('regPass')">👁️</span>
        </div>

        <button class="btn btn-primary" onclick="handleRegister()">XÁC NHẬN ĐĂNG KÝ</button>
        <button class="btn btn-outline" onclick="showLogin()">QUAY LẠI ĐĂNG NHẬP</button>
    </div>
</div>

<script>
    // --- CẤU HÌNH FIREBASE QLDD-2025 CỦA ANH ĐẸP ---
    const firebaseConfig = {
        apiKey: "AIzaSyALxXDNbFdXkI7XvHqiSNb1jnKjj0CbYnE",
        authDomain: "qldd-2025.firebaseapp.com",
        databaseURL: "https://qldd-2025-default-rtdb.firebaseio.com",
        projectId: "qldd-2025",
        storageBucket: "qldd-2025.firebasestorage.app",
        messagingSenderId: "84684010166",
        appId: "1:84684010166:web:bd9c3b5ae4227ee2812c17",
        measurementId: "G-7E5BDTCSEZ"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxaig43qRs3BLv-C9fc96sI78pQgyCBrW8ozaFiC-SxZtLXvK52wcOzMFboxC74Hh4B/exec";

    // Hiện/ẩn mật khẩu
    function togglePass(id) {
        const x = document.getElementById(id);
        x.type = x.type === "password" ? "text" : "password";
    }

    // Tra cứu tên từ MSNV trong Google Sheet khi đăng ký
    function lookupName() {
        const id = document.getElementById('regMsnv').value;
        const regName = document.getElementById('regName');
        if(id.length >= 4) {
            regName.innerText = "🔍 Đang kiểm tra danh sách...";
            fetch(`${WEB_APP_URL}?action=lookup&msnv=${id}`)
            .then(r => r.json())
            .then(d => {
                regName.innerText = (d.hoTen !== "Không tìm thấy") ? "✅ Chào đồng chí: " + d.hoTen : "❌ MSNV không tồn tại!";
            });
        }
    }

    // Xử lý Đăng ký và gửi mail xác thực
    function handleRegister() {
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const nameText = document.getElementById('regName').innerText;

        if(!email || pass.length < 6 || !nameText.includes("✅")) {
            return alert("Vui lòng nhập đúng MSNV, Email và mật khẩu >= 6 ký tự!");
        }

        auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            userCredential.user.sendEmailVerification();
            alert("Đăng ký thành công! Hệ thống đã gửi link xác thực vào Email của bạn. Vui lòng mở Email bấm xác nhận rồi mới có thể đăng nhập.");
            showLogin();
        })
        .catch(e => alert("Lỗi: " + e.message));
    }

    // Xử lý Đăng nhập
    function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;

        if(!email || !pass) return alert("Vui lòng nhập đầy đủ Email và Mật khẩu!");

        auth.signInWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            if(userCredential.user.emailVerified) {
                // Đã xác thực email thành công -> Vào trang chính
                window.location.href = "tham-hoi.html";
            } else {
                alert("Tài khoản này chưa được xác thực qua Email. Vui lòng kiểm tra hộp thư của bạn!");
                auth.signOut();
            }
        })
        .catch(e => alert("Thông tin đăng nhập không chính xác!"));
    }

    // Quên mật khẩu nhận mã qua Email
    function forgotPass() {
        const email = prompt("Nhập Email bạn đã đăng ký để nhận mã đặt lại mật khẩu:");
        if (email) {
            auth.sendPasswordResetEmail(email)
            .then(() => alert("Hệ thống đã gửi hướng dẫn đặt lại mật khẩu vào Email của bạn."))
            .catch(e => alert("Lỗi: " + e.message));
        }
    }

    function showRegister() { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); }
    function showLogin() { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); }
</script>
</body>
</html>
